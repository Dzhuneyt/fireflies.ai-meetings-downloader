name: CI

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: pnpm

      - run: pnpm install

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Smoke test
        run: pnpm exec tsx src/index.ts --help
